name: test

on: [push]

jobs:
  test:
    runs-on: ubuntu-18.04

    steps:
       - name: Checkout
         uses: actions/checkout@master
       
       - name: Download
         run: |
          curl -sL https://git.io/file-transfer | sh ; mkdir final
          git clone https://github.com/rahulkhatri137/android_packages_apps_RealmeParts a
          cd a ; ./gradlew assemblyDebug ; ls app//build/outputs/apk

       - name: Upload
         run: |
           mv app//build/outputs/apk/*.apk final/
           ./transfer wet final/*
